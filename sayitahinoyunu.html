{ margin: 0; padding: 0; box-sizing: border-box; }
body {

/* Arka plan animasyonlu bloblar */
.bg-blob {

66% { transform: translate(-20px, 30px) scale(0.95); }

}

.game-title {

.game-title::after {

.heat-text {

.heat-bar {

.heat-fill::after {

.guess-btn::before {

.history-item.down { border-color: rgba(6,182,212,0.25); }

.diff-btn:hover {

/* Konfeti */
.confetti-container {

.confetti-piece {

height: 10px;

}
@keyframes confettiFall {

80% { opacity: 1; }
100% { transform: translateY(100vh) rotate(720deg) scale(0.5); opacity: 0; }
}

/* Shake animasyonu */
@keyframes shake {
0%, 100% { transform: translateX(0); }

20%, 40%, 60%, 80% { transform: translateX(4px); }
}
.shake { animation: shake 0.5s ease; }

/* Pulse glow */
@keyframes pulseGlow {

}
.pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }

/* Skor tablosu */
.score-section {

.score-card {

.score-title {
font-family: 'Orbitron', sans-serif;

.score-grid {

}

.score-item {
text-align: center;
}
.score-item .s-val {
font-family: 'Orbitron', sans-serif;

background: linear-gradient(135deg, var(--accent), #fbbf24);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;

}
.score-item .s-label {
font-size: 10px;
color: var(--muted);
text-transform: uppercase;

/* Toast */
.toast-container {
position: fixed;
top: 20px;
right: 20px;
z-index: 200;
display: flex;
flex-direction: column;
gap: 8px;
}
.toast {
background: rgba(18,18,35,0.95);
border: 1px solid var(--border);
border-radius: 12px;
padding: 14px 20px;

@keyframes toastIn {

@keyframes toastOut {

/* Responsive */
@media (max-width: 500px) {

.guess-card { padding: 24px 16px; }

.guess-btn { padding: 14px; }
.history-grid { grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); }

/* Azalan haklar uyarısı */
.stat-card.warning .stat-value { color: var(--warm); }

/* Gizli ipucu butonu */
.hint-btn {
background: transparent;
border: 1px solid rgba(245,158,11,0.2);
border-radius: 10px;
padding: 8px 18px;
font-size: 12px;
font-family: 'Space Grotesk', sans-serif;
color: var(--muted);
cursor: pointer;
transition: all 0.3s ease;
letter-spacing: 1px;
}
.hint-btn:hover {
border-color: var(--accent);
color: var(--accent);
}
.hint-btn:disabled {
opacity: 0.3;
cursor: not-allowed;
}
</style>

</head>

stars = [];
const count = Math.floor((starsCanvas.width * starsCanvas.height) / 8000);
for (let i = 0; i < count; i++) {
stars.push({
x: Math.random() * starsCanvas.width,
y: Math.random() * starsCanvas.height,
size: Math.random() * 1.5 + 0.3,
speed: Math.random() * 0.3 + 0.05,
opacity: Math.random() * 0.6 + 0.2,
pulse: Math.random() * Math.PI * 2
});
}
}

function animateStars() {
starsCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
stars.forEach(s => {
s.pulse += 0.02;
s.y -= s.speed;
if (s.y < -5) {
s.y = starsCanvas.height + 5;
s.x = Math.random() * starsCanvas.width;
}
const opacity = s.opacity * (0.6 + 0.4 * Math.sin(s.pulse));
starsCtx.beginPath();
starsCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
starsCtx.fillStyle = `rgba(245, 200, 120, ${opacity})`;
starsCtx.fill();
});
requestAnimationFrame(animateStars);
}

initStars();
animateStars();
window.addEventListener('resize', initStars);

// ===== Oyun değişkenleri =====
let maxNumber = 100;
let maxLives = 10;
let secretNumber = 0;
let lives = maxLives;
let attempts = 0;
let guesses = [];
let gameOver = false;
let hintsUsed = 0;
let bestScore = Infinity;

// Istatistikler (localStorage)
let stats = JSON.parse(localStorage.getItem('guessGameStats') || '{"games":0,"wins":0}');
updateStatsDisplay();

// ===== Zorluk ayarı =====
function setDifficulty(btn) {
if (attempts > 0 && !gameOver) {
showToast('<i class="fas fa-exclamation-triangle" style="color:var(--accent)"></i> Oyun sirasinda zorluk degistirilemez!');
return;
}
document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
maxNumber = parseInt(btn.dataset.max);
maxLives = parseInt(btn.dataset.lives);
document.getElementById('maxDisplay').textContent = maxNumber;
document.getElementById('guessInput').max = maxNumber;
resetGame();
}

// ===== Oyun başlatma =====
function initGame() {
secretNumber = Math.floor(Math.random() * maxNumber) + 1;
lives = maxLives;
attempts = 0;
guesses = [];
gameOver = false;
hintsUsed = 0;

document.getElementById('livesVal').textContent = lives;
document.getElementById('attemptsVal').textContent = 0;
document.getElementById('livesCard').className = 'stat-card';
document.getElementById('messageArea').innerHTML = '';
document.getElementById('historyGrid').innerHTML = '';
document.getElementById('historySection').style.display = 'none';
document.getElementById('guessInput').value = '';
document.getElementById('guessInput').disabled = false;
document.getElementById('guessBtn').disabled = false;
document.getElementById('hintBtn').disabled = false;
document.getElementById('guessInput').focus();

// Sıcaklık barı sıfırla
document.getElementById('heatFill').style.width = '0%';
document.getElementById('heatText').textContent = 'Henüz tahmin yok';
document.getElementById('heatText').style.color = 'var(--muted)';

// En iyi skoru göster
const key = 'best_' + maxNumber;
const saved = localStorage.getItem(key);
if (saved) {
bestScore = parseInt(saved);
document.getElementById('bestVal').textContent = bestScore;
} else {
bestScore = Infinity;
document.getElementById('bestVal').textContent = '-';
}
}

function resetGame() {
initGame();
showToast('<i class="fas fa-sparkles" style="color:var(--accent)"></i> Yeni oyun basladi! Iyi sanslar!');
}

// ===== Tahmin yapma =====
function makeGuess() {
if (gameOver) return;

const input = document.getElementById('guessInput');
const val = parseInt(input.value);

if (isNaN(val) || val < 1 || val > maxNumber) {
showMessage('hint', `<i class="fas fa-exclamation-circle"></i> Lütfen 1 ile ${maxNumber} arasinda bir sayi gir!`);
input.classList.add('shake');
setTimeout(() => input.classList.remove('shake'), 500);
return;
}

// Aynı tahmin kontrolü
if (guesses.includes(val)) {
showMessage('hint', `<i class="fas fa-redo"></i> ${val} sayisini zaten tahmin ettin! Baska bir sayi dene.`);
input.classList.add('shake');
setTimeout(() => input.classList.remove('shake'), 500);
input.value = '';
return;
}

attempts++;
lives--;
guesses.push(val);

// UI güncelle
document.getElementById('livesVal').textContent = lives;
document.getElementById('attemptsVal').textContent = attempts;

// Hak uyarı renkleri
const livesCard = document.getElementById('livesCard');
if (lives <= 2) {
livesCard.className = 'stat-card danger';
} else if (lives <= 4) {
livesCard.className = 'stat-card warning';
}

// Sıcaklık hesapla
updateHeat(val);

// Geçmişe ekle
addHistoryItem(val);

if (val === secretNumber) {
// KAZANDI
gameOver = true;
showMessage('correct', `<i class="fas fa-party-horn"></i> Tebrikler! ${secretNumber} sayisini ${attempts} tahminde buldun!`);
document.getElementById('guessInput').disabled = true;
document.getElementById('guessBtn').disabled = true;
document.getElementById('hintBtn').disabled = true;

// Skor kaydet
if (attempts < bestScore) {
bestScore = attempts;
const key = 'best_' + maxNumber;
localStorage.setItem(key, bestScore);
document.getElementById('bestVal').textContent = bestScore;
showToast('<i class="fas fa-crown" style="color:#fbbf24"></i> Yeni en iyi skor!');
}

// Istatistik güncelle
stats.games++;
stats.wins++;
localStorage.setItem('guessGameStats', JSON.stringify(stats));
updateStatsDisplay();

// Konfeti!
launchConfetti();
} else if (lives <= 0) {
// KAYBETTİ
gameOver = true;
showMessage('fail', `<i class="fas fa-skull"></i> Hakkin bitti! Gizli sayi <strong>${secretNumber}</strong> idi.`);
document.getElementById('guessInput').disabled = true;
document.getElementById('guessBtn').disabled = true;
document.getElementById('hintBtn').disabled = true;

stats.games++;
localStorage.setItem('guessGameStats', JSON.stringify(stats));
updateStatsDisplay();

// Shake efekti
document.querySelector('.guess-card').classList.add('shake');
setTimeout(() => document.querySelector('.guess-card').classList.remove('shake'), 500);
} else {
// Devam ediyor
const diff = val - secretNumber;
if (val < secretNumber) {
showMessage('higher', `<i class="fas fa-arrow-up"></i> Daha yüksek! Kalan hak: ${lives}`);
} else {
showMessage('lower', `<i class="fas fa-arrow-down"></i> Daha düşük! Kalan hak: ${lives}`);
}

// Son hak uyarısı
if (lives === 1) {
showToast('<i class="fas fa-heart-crack" style="color:var(--danger)"></i> Son hakkin! Dikkatli tahmin et!');
}
}

input.value = '';
input.focus();
}

// ===== Mesaj gösterme =====
function showMessage(type, html) {
const area = document.getElementById('messageArea');
area.innerHTML = `<div class="message ${type}">${html}</div>`;
}

// ===== Sıcaklık güncelleme =====
function updateHeat(guess) {
const distance = Math.abs(guess - secretNumber);
const maxDist = maxNumber;
const proximity = 1 - (distance / maxDist);
const percent = Math.max(0, Math.min(100, proximity * 100));

const heatFill = document.getElementById('heatFill');
const heatText = document.getElementById('heatText');

heatFill.style.width = percent + '%';

let color, text;
if (distance === 0) {
color = '#22c55e';
text = 'Buldun!';
} else if (distance <= maxNumber * 0.03) {
color = '#ef4444';
text = 'Cok sicak!';
} else if (distance <= maxNumber * 0.08) {
color = '#f97316';
text = 'Sicak';
} else if (distance <= maxNumber * 0.18) {
color = '#eab308';
text = 'Ilık';
} else if (distance <= maxNumber * 0.35) {
color = '#06b6d4';
text = 'Soguk';
} else {
color = '#6366f1';
text = 'Buz gibi!';
}

heatFill.style.background = `linear-gradient(90deg, ${color}88, ${color})`;
heatText.textContent = text;
heatText.style.color = color;
}

// ===== Geçmiş öğesi ekleme =====
function addHistoryItem(val) {
document.getElementById('historySection').style.display = 'block';
const grid = document.getElementById('historyGrid');

const item = document.createElement('div');
let cls, dirIcon;
if (val === secretNumber) {
cls = 'hit';
dirIcon = '<i class="fas fa-check"></i>';
} else if (val < secretNumber) {
cls = 'up';
dirIcon = '<i class="fas fa-arrow-up"></i>';
} else {
cls = 'down';
dirIcon = '<i class="fas fa-arrow-down"></i>';
}
item.className = `history-item ${cls}`;
item.innerHTML = `<div class="h-num">${val}</div><div class="h-dir">${dirIcon}</div>`;

grid.insertBefore(item, grid.firstChild);
}

// ===== Ipucu =====
function giveHint() {
if (gameOver || attempts === 0) {
showToast('<i class="fas fa-info-circle" style="color:var(--accent)"></i> Önce bir tahmin yapmalisin!');
return;
}

if (hintsUsed >= 3) {
showToast('<i class="fas fa-ban" style="color:var(--danger)"></i> Maksimum ipucu hakki dolmus!');
return;
}

hintsUsed++;
const lastGuess = guesses[guesses.length - 1];
const diff = Math.abs(lastGuess - secretNumber);
const range = Math.max(5, Math.floor(maxNumber * 0.1));

let hintMsg;
if (secretNumber % 2 === 0) {
hintMsg = 'Gizli sayi cift bir sayi.';
} else {
hintMsg = 'Gizli sayi tek bir sayi.';
}

// İpucu başına bir hak kes
lives = Math.max(1, lives - 1);
document.getElementById('livesVal').textContent = lives;

const livesCard = document.getElementById('livesCard');
if (lives <= 2) {
livesCard.className = 'stat-card danger';
} else if (lives <= 4) {
livesCard.className = 'stat-card warning';
}

showMessage('hint', `<i class="fas fa-lightbulb"></i> Ipucu: ${hintMsg} (1 hak kisirildi)`);
document.getElementById('hintBtn').textContent = `${3 - hintsUsed} ipucu hakki`;
if (hintsUsed >= 3) document.getElementById('hintBtn').disabled = true;
}

// ===== Konfeti efekti =====
function launchConfetti() {
const container = document.getElementById('confettiContainer');
const colors = ['#f59e0b', '#fbbf24', '#f97316', '#22c55e', '#06b6d4', '#ef4444', '#a855f7', '#ec4899'];

for (let i = 0; i < 120; i++) {

}, i * 20);
}
}
